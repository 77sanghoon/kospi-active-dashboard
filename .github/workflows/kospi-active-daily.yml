name: KOSPI Active Daily Collector

on:
  schedule:
    - cron: "0 1 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Requested date in YYYY-MM-DD. Empty uses today's KST date."
        required: false
        type: string
      backfill_history:
        description: "Slow mode: backfill KoAct/KODEX history. Leave off for normal runs."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: kospi-active-daily
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore bundled project source
        shell: bash
        run: |
          cat .github/source-bundle/part-*.b64 > kospi-active-source.zip.b64
          python - <<'PY'
          import base64
          import pathlib
          import shutil
          import zipfile

          root = pathlib.Path('.').resolve()
          encoded = pathlib.Path('kospi-active-source.zip.b64').read_text(encoding='utf-8')
          zip_path = pathlib.Path('kospi-active-source.zip')
          zip_path.write_bytes(base64.b64decode(''.join(encoded.split())))

          with zipfile.ZipFile(zip_path) as archive:
              for member in archive.infolist():
                  normalized = member.filename.replace(chr(92), '/')
                  parts = [part for part in pathlib.PurePosixPath(normalized).parts if part not in ('', '.')]
                  if not parts or any(part == '..' for part in parts):
                      raise ValueError(f'Unsafe archive path: {member.filename}')
                  target = root.joinpath(*parts)
                  if member.is_dir():
                      target.mkdir(parents=True, exist_ok=True)
                      continue
                  target.parent.mkdir(parents=True, exist_ok=True)
                  with archive.open(member) as source, target.open('wb') as dest:
                      shutil.copyfileobj(source, dest)
          PY
          rm kospi-active-source.zip kospi-active-source.zip.b64

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check cloud setup
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICE_ACCOUNT_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_B64 }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
        run: python scripts/check_cloud_setup.py

      - name: Create requested date sheet first
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.date != ''
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICE_ACCOUNT_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_B64 }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          REQUESTED_DATE: ${{ github.event.inputs.date || '' }}
        shell: bash
        run: |
          python - <<'PY'
          import os
          from datetime import datetime
          from zoneinfo import ZoneInfo

          from kospi_active.config import load_etfs
          from kospi_active.providers import ProviderError, create_provider
          from kospi_active.reporting import DATE_HEADERS, holding_to_row
          from kospi_active.sheets_store import GoogleSheetsStore

          requested_date = os.environ['REQUESTED_DATE']
          collected_at = datetime.now(ZoneInfo('Asia/Seoul')).isoformat(timespec='seconds')
          rows = []
          messages = []
          for etf in load_etfs():
              try:
                  holdings = create_provider(etf).fetch_holdings(requested_date)
              except ProviderError as exc:
                  messages.append(f'{etf.name}: {exc}')
                  continue
              for holding in holdings:
                  row = holding_to_row(holding, collected_at)
                  if row.get('trade_date') == requested_date:
                      row.setdefault('weight_delta', 0)
                      row.setdefault('share_delta', 0)
                      row.setdefault('market_value_delta', 0)
                      rows.append(row)
              messages.append(f'{etf.name}: {len(holdings)} fetched')

          if not rows:
              print('No rows for requested date. ' + ' | '.join(messages))
              raise SystemExit(0)

          rows.sort(key=lambda row: (row['etf_code'], -float(row.get('weight') or 0), row['stock_name']))
          store = GoogleSheetsStore.from_env()
          store.update_values(requested_date, DATE_HEADERS, rows)
          print(f'Created or refreshed {requested_date} with {len(rows)} rows. ' + ' | '.join(messages))
          PY

      - name: Collect ETF holdings and update Google Sheets
        id: collect_data
        continue-on-error: true
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GOOGLE_SERVICE_ACCOUNT_B64: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_B64 }}
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          REQUESTED_DATE: ${{ github.event.inputs.date || '' }}
          BACKFILL_HISTORY: ${{ github.event.inputs.backfill_history || 'false' }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          args=()
          if [ -n "$REQUESTED_DATE" ]; then
            args+=(--date "$REQUESTED_DATE")
          fi
          if [ "$BACKFILL_HISTORY" != "true" ] || [ "$GITHUB_EVENT_NAME" = "schedule" ]; then
            args+=(--latest-only)
          fi
          if [ "$BACKFILL_HISTORY" = "true" ]; then
            args+=(--sleep-seconds 8)
          fi
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            args+=(--run-weekend)
          fi
          python scripts/cloud_daily.py "${args[@]}"

      - name: Note collector warning
        if: steps.collect_data.outcome == 'failure'
        run: |
          echo "::warning::ETF collector returned a non-zero exit code. Existing Google Sheets data and generated dashboard files will still be deployed. Check Collection_Log for source-level failures."

      - name: Reduce search indexing
        shell: bash
        run: |
          mkdir -p dashboard
          cat > dashboard/robots.txt <<'EOF'
          User-agent: *
          Disallow: /
          EOF
          cat > dashboard/vercel.json <<'EOF'
          {
            "$schema": "https://openapi.vercel.sh/vercel.json",
            "headers": [
              {
                "source": "/(.*)",
                "headers": [
                  {
                    "key": "X-Robots-Tag",
                    "value": "noindex, nofollow, noarchive, nosnippet"
                  }
                ]
              }
            ]
          }
          EOF
          python - <<'PY'
          from pathlib import Path

          html_path = Path('dashboard/index.html')
          if not html_path.exists():
              raise FileNotFoundError('dashboard/index.html was not generated')

          text = html_path.read_text(encoding='utf-8')
          lower = text.lower()
          meta = '<meta name="robots" content="noindex,nofollow,noarchive,nosnippet">'
          if 'name="robots"' not in lower and "name='robots'" not in lower:
              if '<head>' in lower:
                  index = lower.index('<head>') + len('<head>')
                  text = text[:index] + '\n  ' + meta + text[index:]
              else:
                  text = meta + '\n' + text
              html_path.write_text(text, encoding='utf-8')
          PY

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard

  deploy:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
